<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 Flash Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .code-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg shadow-lg shadow-blue-500/20">
                    <i data-lucide="sparkles" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Gemini <span class="text-blue-400">2.5 Flash</span></h1>
            </div>
            <span class="px-3 py-1 rounded-full bg-slate-800 text-xs font-medium border border-slate-700 text-slate-400">v2.5.0-stable</span>
        </header>

        <div class="glass rounded-2xl p-6 shadow-2xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">API Key</label>
                    <div class="relative">
                        <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" id="apiKey" placeholder="Paste your Google AI Studio key here..." 
                               class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Your Prompt</label>
                    <textarea id="prompt" rows="4" placeholder="Ask Gemini 2.5 Flash anything..." 
                              class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"></textarea>
                </div>

                <button onclick="sendRequest()" id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2 group">
                    <span>Generate Response</span>
                    <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </div>

        <div id="status" class="hidden flex items-center justify-center gap-3 py-4 text-slate-400 italic">
            <div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent"></div>
            Thinking...
        </div>

        <div id="resultCard" class="hidden glass rounded-2xl overflow-hidden shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-slate-800/50 px-6 py-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="bot" class="w-4 h-4 text-blue-400"></i>
                    <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Response</span>
                </div>
                <button onclick="copyResponse()" class="text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="responseOutput" class="p-6 text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        async function sendRequest() {
            const key = document.getElementById('apiKey').value;
            const promptInput = document.getElementById('prompt').value;
            const status = document.getElementById('status');
            const resultCard = document.getElementById('resultCard');
            const output = document.getElementById('responseOutput');
            const btn = document.getElementById('sendBtn');

            if (!key || !promptInput) {
                alert("Please enter both an API key and a prompt.");
                return;
            }

            // UI State: Loading
            status.classList.remove('hidden');
            resultCard.classList.add('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptInput }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.textContent = data.candidates[0].content.parts[0].text;
                    resultCard.classList.remove('hidden');
                } else {
                    throw new Error(data.error?.message || "Unexpected API response format");
                }
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                status.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function copyResponse() {
            const text = document.getElementById('responseOutput').textContent;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
